<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      // Extract the path that caused the 404 and redirect with it as a hash
      const path = window.location.pathname;
      // Remove the base path "/Portfolio" and redirect to home with the route as hash
      window.location.replace('/Portfolio/#' + path.replace('/Portfolio', '') || '/');
    </script>
  </head>
  <body></body>
</html>
